databases:
  - name: lingogenbot-db
    databaseName: lingogenbot
    user: lingogenbot
    plan: free

services:
  - type: web
    name: lingogenbot-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lingogenbot-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONITOR_CHANNEL_ID
        value: ""
      - key: MATCH_TIMEOUT_SECONDS
        value: "120"
      - key: SESSION_DURATION_SECONDS
        value: "300"
      - key: SEARCH_UPDATE_INTERVAL
        value: "15"
      - key: DEBUG
        value: "false"
